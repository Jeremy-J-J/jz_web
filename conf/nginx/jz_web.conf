server {
    listen 8888;
    server_name _;

    # 前端静态页面
    location / {
        root /workspace/pro/jz_web/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 7d;
    }

    # 后端API
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 20M;
    }

    # 资源封面（管理员上传）
    location /uploads/ {
        alias /workspace/pro/jz_web/data/uploads/;
        expires 30d;
    }

    # 日志
    access_log /workspace/pro/jz_web/runtime/logs/nginx.log;
    error_log /workspace/pro/jz_web/runtime/logs/nginx.err.log;
}