server {
    listen 443 ssl;
    server_name ultimatevisionai.cn;

    ssl_certificate /workspace/env/ultimatevisionai.cn_nginx/ultimatevisionai.cn_bundle.pem;
    ssl_certificate_key /workspace/env/ultimatevisionai.cn_nginx/ultimatevisionai.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 前端静态页面
    location / {
        root /workspace/pro/jz_web/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 7d;
    }

    # 后端API
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 20M;
    }

    # 资源封面（管理员上传）
    location /uploads/ {
        alias /workspace/pro/jz_web/data/uploads/;
        expires 30d;
    }

    # 日志
    access_log /workspace/pro/jz_web/runtime/logs/nginx.log;
    error_log /workspace/pro/jz_web/runtime/logs/nginx.err.log;
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name ultimatevisionai.cn;
    return 301 https://$server_name$request_uri;
}
